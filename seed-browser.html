function log(msg, cls='info') {
  logEl.innerHTML += `<div class="${cls}">${msg}</div>`;
  logEl.scrollTop = logEl.scrollHeight;
}
function setStep(id, state) {
  const el = document.getElementById(id);
  el.className = 'step ' + state;
}
function setProgress(pct) {
  progress = pct;
  progEl.style.width = pct + '%';

async function sql(query, useService = true) {
  const key = useService ? SVC_KEY : ANON_KEY;
  const res = await fetch(`${URL_BASE}/rest/v1/rpc/exec_sql`, {
    method: 'POST',
    headers: {
      'apikey': key,
      'Authorization': `Bearer ${key}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify({ query })
  });
  // Si exec_sql no existe, usamos el endpoint de query directo
  if (res.status === 404) {
    const res2 = await fetch(`${URL_BASE}/rest/v1/?query=${encodeURIComponent(query)}`, {
      headers: { 'apikey': key, 'Authorization': `Bearer ${key}` }
    });
    return res2;
  }
  return res;
}

async function execSQL(sqlText, description) {
  log(`   ⏳ ${description}...`, 'dim');
  const res = await fetch(`${URL_BASE}/rest/v1/rpc/exec_sql`, {
    method: 'POST',
    headers: {
      'apikey': SVC_KEY,
      'Authorization': `Bearer ${SVC_KEY}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify({ sql: sqlText })
  });
  
  if (!res.ok) {
    const text = await res.text();
    // Ignorar errores de "ya existe"
    if (text.includes('already exists') || text.includes('duplicate') || text.includes('ya existe')) {
      log(`   ⚠️  ${description}: ya existe (OK)`, 'warn');
      return true;
    }
    log(`   ❌ ${description}: ${text.slice(0,200)}`, 'err');
    return false;
  }
  log(`   ✅ ${description}`, 'ok');
  return true;
}

async function api(path, method='GET', body=null, svc=false) {
  const key = svc ? SVC_KEY : ANON_KEY;
  const res = await fetch(`${URL_BASE}/rest/v1/${path}`, {
    method,
    headers: {
      'apikey': key,
      'Authorization': `Bearer ${key}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  const text = await res.text();
  if (!res.ok && !text.includes('already exists')) {
    throw new Error(`${method} ${path}: ${res.status} ${text.slice(0,300)}`);
  }
  return text ? JSON.parse(text) : null;
}

async function createTableViaREST(name) {
  // Verificar si la tabla existe intentando un query
  try {
    const res = await fetch(`${URL_BASE}/rest/v1/${name}?limit=1`, {
      headers: { 'apikey': SVC_KEY, 'Authorization': `Bearer ${SVC_KEY}` }
    });
    if (res.ok) {
      log(`   ✅ Tabla <b>${name}</b> → accesible`, 'ok');
      return true;
    } else {
      log(`   ❌ Tabla <b>${name}</b> → no existe (${res.status})`, 'err');
      return false;
    }
  } catch(e) {
    log(`   ❌ Tabla <b>${name}</b> → error: ${e.message}`, 'err');
    return false;
  }
}

        for (const [rol,turno] of [['titular_a','AM'],['titular_b','PM'],['relevante','AM']]) {
          if (!existKeys.has(`${dia}-${rol}`)) {
            asigs.push({ programacion_id:progId, empresa_id:EMPRESA_ID, dia, rol, turno,
              jornada: (rol==='relevante'||finde) ? 'descanso_remunerado' : 'normal',
              vigilante_id:null });
          }
        }
      }

      if (asigs.length > 0) {
        for (let i=0; i<asigs.length; i+=50) {
          await api('asignaciones_programacion','POST',asigs.slice(i,i+50),true);
        }
        log(`   ✅ ${asigs.length} asignaciones creadas (30 días × 3 roles)`, 'ok');
      }
    } catch(e) {
      log(`   ❌ ${puesto.nombre}: ${e.message}`, 'err');
    }
  }

  setStep('s4', 'done');
  setProgress(100);

  log('\n🎉 <b>¡Setup completado!</b>', 'ok');
  log('→ Abre la app → PUESTOS → verás CORAZA CONTROL y ALTOS DEL PINO', 'dim');
  log('→ Haz clic en cada puesto para ver el tablero de Junio 2026', 'dim');

  const btn = document.getElementById('btn');
  btn.textContent = '✅ Setup Completado — Abrir App';
  btn.className = 'btn btn-success';
  btn.disabled = false;
  btn.onclick = () => window.open('http://localhost:5173', '_blank');
}
